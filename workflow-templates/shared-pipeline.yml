name: Shared CI Cookbook

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run App Tests
        run: |
          echo "Running unit tests..."
          # Եթե ունես թեստեր, կարող ես գրել python -m unittest, եթե չէ՝ ուղղակի echo

  build-and-scan:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image Locally
        run: |
          docker build -t ${{ inputs.image_name }}:${{ github.sha }} .

      # 🛡️ TRIVY SECURITY GATE (Blocks pipeline on HIGH or CRITICAL)
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: '${{ inputs.image_name }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # 🎯 Սա ստիպում է փայփլայնին կանգնել, եթե վտանգավոր սխալ կա
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Safe Image to DockerHub
        run: |
          docker push ${{ inputs.image_name }}:${{ github.sha }}
