name: Shared CI Cookbook

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
name: Reusable Build and Scan Workflow

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
    secrets:
      REGISTRY_TOKEN:
        required: true

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Build Docker Image
        run: docker build -t ${{ inputs.image }} .
        
      - name: Log in to DockerHub
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login -u "eriknazaryan" --password-stdin
        
      - name: Push Docker Image
        run: docker push ${{ inputs.image }}

  scan:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Run Trivy Security Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1' # 🛑 Gate: Ֆեյլ է անում ջոբը, եթե խոցելիություն գտնի
jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run App Tests
        run: |
          echo "Running unit tests..."

  build-and-scan:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image Locally
        run: |
          docker build -t ${{ inputs.image_name }}:${{ github.sha }} .

      # 🛡️ TRIVY SECURITY GATE (Blocks pipeline on HIGH or CRITICAL)
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ inputs.image_name }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Safe Image to DockerHub
        run: |
          docker push ${{ inputs.image_name }}:${{ github.sha }}
